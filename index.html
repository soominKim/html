<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 코드 에디터</title>
<style>
  :root {
    --bg: #ffffff;
    --editor-bg: #1e1e1e;
    --editor-text: #d4d4d4;
    --preview-bg: #ffffff;
    --preview-border: #d1d5db;
    --toolbar-bg: #f3f4f6;
    --toolbar-border: #e5e7eb;
    --text: #1f2937;
    --text-muted: #6b7280;
    --btn-bg: #e5e7eb;
    --btn-hover: #d1d5db;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --line-num: #858585;
    --line-border: #333333;
    --selection: #264f78;
  }

  .dark {
    --bg: #0f172a;
    --editor-bg: #1e293b;
    --editor-text: #e2e8f0;
    --preview-bg: #ffffff;
    --preview-border: #334155;
    --toolbar-bg: #1e293b;
    --toolbar-border: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --btn-bg: #334155;
    --btn-hover: #475569;
    --accent: #60a5fa;
    --accent-hover: #3b82f6;
    --line-num: #64748b;
    --line-border: #475569;
    --selection: #1e40af;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toolbar h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .toolbar h1 span {
    color: var(--accent);
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: var(--btn-bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--btn-hover); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .font-size-control {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .font-size-control .btn {
    width: 30px;
    height: 30px;
    padding: 0;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
  }

  .font-size-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 36px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* Main Content */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    margin-right: 6px;
  }

  /* Editor Area */
  .editor-wrapper {
    flex: 1;
    display: flex;
    overflow: auto;
    background: var(--editor-bg);
    transition: background 0.3s;
  }

  .line-numbers {
    padding: 14px 0;
    text-align: right;
    user-select: none;
    color: var(--line-num);
    border-right: 1px solid var(--line-border);
    flex-shrink: 0;
    overflow: hidden;
    transition: color 0.3s, border-color 0.3s;
  }

  .line-numbers div {
    padding: 0 12px 0 14px;
    line-height: 1.6;
  }

  .editor-container {
    flex: 1;
    position: relative;
    overflow: auto;
  }

  #highlight, #editor {
    width: 100%;
    min-height: 100%;
    padding: 14px;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    line-height: 1.6;
    tab-size: 2;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto;
    position: absolute;
    top: 0;
    left: 0;
  }

  #highlight {
    pointer-events: none;
    z-index: 0;
    color: var(--editor-text);
  }

  #editor {
    z-index: 1;
    color: transparent;
    caret-color: var(--editor-text);
  }

  #editor::selection {
    background: var(--selection);
  }

  /* Syntax colors */
  .syn-tag { color: #569cd6; }
  .syn-attr { color: #9cdcfe; }
  .syn-attr-val { color: #ce9178; }
  .syn-comment { color: #6a9955; font-style: italic; }
  .syn-doctype { color: #808080; }
  .syn-entity { color: #d7ba7d; }
  .syn-text { color: #d4d4d4; }
  .syn-bracket { color: #808080; }
  .syn-equal { color: #d4d4d4; }

  .dark .syn-tag { color: #7dd3fc; }
  .dark .syn-attr { color: #a5f3fc; }
  .dark .syn-attr-val { color: #fbbf24; }
  .dark .syn-comment { color: #86efac; font-style: italic; }
  .dark .syn-doctype { color: #94a3b8; }
  .dark .syn-entity { color: #fcd34d; }
  .dark .syn-text { color: #e2e8f0; }
  .dark .syn-bracket { color: #94a3b8; }
  .dark .syn-equal { color: #e2e8f0; }

  /* Divider */
  .divider {
    width: 4px;
    background: var(--toolbar-border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .divider:hover, .divider.dragging {
    background: var(--accent);
  }

  /* Preview */
  .preview-panel {
    border-left: none;
  }

  #preview {
    flex: 1;
    border: none;
    background: var(--preview-bg);
    width: 100%;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main {
      flex-direction: column;
    }
    .divider {
      width: 100%;
      height: 4px;
      cursor: row-resize;
    }
    .toolbar {
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-left">
    <h1>&lt;<span>/</span>&gt; HTML 코드 에디터</h1>
  </div>
  <div class="toolbar-right">
    <div class="font-size-control">
      <button class="btn" onclick="changeFontSize(-1)" title="글씨 작게">−</button>
      <span class="font-size-label" id="fontSizeLabel">14px</span>
      <button class="btn" onclick="changeFontSize(1)" title="글씨 크게">+</button>
    </div>
    <button class="btn" id="themeToggle" onclick="toggleTheme()">
      <span id="themeIcon">🌙</span> 다크모드
    </button>
    <button class="btn btn-primary" onclick="runCode()">▶ 실행</button>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title"><span class="dot"></span>코드 입력</span>
      <button class="btn" onclick="resetCode()" style="font-size:11px; padding:3px 8px;">초기화</button>
    </div>
    <div class="editor-wrapper">
      <div class="line-numbers" id="lineNumbers"></div>
      <div class="editor-container" id="editorContainer">
        <pre id="highlight" aria-hidden="true"></pre>
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="panel preview-panel">
    <div class="panel-header">
      <span class="panel-title"><span class="dot"></span>미리보기</span>
    </div>
    <iframe id="preview" sandbox="allow-scripts"></iframe>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const highlight = document.getElementById('highlight');
const preview = document.getElementById('preview');
const lineNumbers = document.getElementById('lineNumbers');
const editorContainer = document.getElementById('editorContainer');
const fontSizeLabel = document.getElementById('fontSizeLabel');
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const divider = document.getElementById('divider');

let fontSize = 14;
let isDark = false;

const defaultCode = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 첫 웹페이지</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.8;
      color: #333;
    }
    h1 { color: #3b82f6; }
    .highlight {
      background: #fef3c7;
      padding: 2px 6px;
      border-radius: 4px;
    }
    ul { padding-left: 20px; }
    li { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>안녕하세요! 👋</h1>
  <p>이것은 <span class="highlight">HTML</span>로 만든 웹페이지입니다.</p>

  <h2>HTML 기본 태그</h2>
  <ul>
    <li><strong>&lt;h1&gt;</strong> ~ <strong>&lt;h6&gt;</strong> : 제목</li>
    <li><strong>&lt;p&gt;</strong> : 문단</li>
    <li><strong>&lt;ul&gt;</strong>, <strong>&lt;li&gt;</strong> : 목록</li>
    <li><strong>&lt;a&gt;</strong> : 링크</li>
    <li><strong>&lt;img&gt;</strong> : 이미지</li>
  </ul>

  <p>코드를 수정하고 <strong>▶ 실행</strong> 버튼을 눌러보세요!</p>
</body>
</html>`;

// Init
editor.value = defaultCode;
setFontSize(fontSize);
updateLineNumbers();
updateHighlight();
runCode();

// Functions
function runCode() {
  const code = editor.value;
  preview.srcdoc = code;
}

function changeFontSize(delta) {
  fontSize = Math.max(10, Math.min(28, fontSize + delta));
  setFontSize(fontSize);
  updateLineNumbers();
}

function setFontSize(size) {
  const family = "'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace";
  editor.style.fontFamily = family;
  editor.style.fontSize = size + 'px';
  highlight.style.fontFamily = family;
  highlight.style.fontSize = size + 'px';
  lineNumbers.style.fontFamily = family;
  lineNumbers.style.fontSize = size + 'px';
  fontSizeLabel.textContent = size + 'px';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlightHTML(code) {
  let result = '';
  let i = 0;
  const len = code.length;

  while (i < len) {
    // HTML comments: <!-- ... -->
    if (code.startsWith('<!--', i)) {
      const end = code.indexOf('-->', i + 4);
      const closeIdx = end === -1 ? len : end + 3;
      result += '<span class="syn-comment">' + escapeHtml(code.slice(i, closeIdx)) + '</span>';
      i = closeIdx;
    }
    // DOCTYPE
    else if (code.startsWith('<!', i) && /^<![a-zA-Z]/.test(code.slice(i))) {
      const end = code.indexOf('>', i);
      const closeIdx = end === -1 ? len : end + 1;
      result += '<span class="syn-doctype">' + escapeHtml(code.slice(i, closeIdx)) + '</span>';
      i = closeIdx;
    }
    // HTML tags
    else if (code[i] === '<' && (code[i + 1] === '/' || /[a-zA-Z]/.test(code[i + 1] || ''))) {
      result += '<span class="syn-bracket">&lt;</span>';
      i++;
      // closing slash
      if (code[i] === '/') {
        result += '<span class="syn-bracket">/</span>';
        i++;
      }
      // tag name
      let tagName = '';
      while (i < len && /[a-zA-Z0-9\-]/.test(code[i])) {
        tagName += code[i];
        i++;
      }
      if (tagName) {
        result += '<span class="syn-tag">' + escapeHtml(tagName) + '</span>';
      }
      // attributes and closing
      while (i < len && code[i] !== '>') {
        // whitespace
        if (/\s/.test(code[i])) {
          result += code[i];
          i++;
        }
        // self-closing slash
        else if (code[i] === '/' && code[i + 1] === '>') {
          result += '<span class="syn-bracket">/</span>';
          i++;
        }
        // attribute
        else {
          // attr name
          let attr = '';
          while (i < len && code[i] !== '=' && code[i] !== '>' && !/\s/.test(code[i]) && code[i] !== '/') {
            attr += code[i];
            i++;
          }
          if (attr) {
            result += '<span class="syn-attr">' + escapeHtml(attr) + '</span>';
          }
          // = sign
          if (code[i] === '=') {
            result += '<span class="syn-equal">=</span>';
            i++;
            // attr value
            if (code[i] === '"' || code[i] === "'") {
              const quote = code[i];
              let val = quote;
              i++;
              while (i < len && code[i] !== quote) {
                val += code[i];
                i++;
              }
              if (i < len) { val += code[i]; i++; }
              result += '<span class="syn-attr-val">' + escapeHtml(val) + '</span>';
            } else {
              // unquoted value
              let val = '';
              while (i < len && !/[\s>]/.test(code[i])) {
                val += code[i];
                i++;
              }
              result += '<span class="syn-attr-val">' + escapeHtml(val) + '</span>';
            }
          }
        }
      }
      // closing >
      if (i < len && code[i] === '>') {
        result += '<span class="syn-bracket">&gt;</span>';
        i++;
      }
    }
    // HTML entities: &xxx;
    else if (code[i] === '&') {
      let entity = '&';
      let j = i + 1;
      while (j < len && j - i < 10 && code[j] !== ';' && !/\s/.test(code[j])) {
        entity += code[j];
        j++;
      }
      if (j < len && code[j] === ';') {
        entity += ';';
        j++;
        result += '<span class="syn-entity">' + escapeHtml(entity) + '</span>';
        i = j;
      } else {
        result += '&amp;';
        i++;
      }
    }
    // Plain text
    else {
      let text = '';
      while (i < len && code[i] !== '<' && code[i] !== '&') {
        text += code[i];
        i++;
      }
      result += '<span class="syn-text">' + escapeHtml(text) + '</span>';
    }
  }

  return result;
}

function updateHighlight() {
  highlight.innerHTML = highlightHTML(editor.value) + '\n';
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  themeIcon.textContent = isDark ? '☀️' : '🌙';
  themeToggle.innerHTML = `<span id="themeIcon">${isDark ? '☀️' : '🌙'}</span> ${isDark ? '라이트모드' : '다크모드'}`;
}

function resetCode() {
  if (confirm('코드를 초기 상태로 되돌릴까요?')) {
    editor.value = defaultCode;
    updateLineNumbers();
    updateHighlight();
    runCode();
  }
}

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) {
    html += '<div>' + i + '</div>';
  }
  lineNumbers.innerHTML = html;
}

// Events
editor.addEventListener('input', () => {
  updateLineNumbers();
  updateHighlight();
});

editor.addEventListener('scroll', () => {
  lineNumbers.style.transform = `translateY(-${editor.scrollTop}px)`;
  highlight.scrollTop = editor.scrollTop;
  highlight.scrollLeft = editor.scrollLeft;
});

editor.addEventListener('keydown', (e) => {
  // Tab support
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updateLineNumbers();
    updateHighlight();
  }
  // Ctrl/Cmd + Enter to run
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runCode();
  }
});

// Divider drag
let isDragging = false;

divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const panels = main.querySelectorAll('.panel');
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.2, Math.min(0.8, ratio));
  panels[0].style.flex = 'none';
  panels[0].style.width = (clamped * 100) + '%';
  panels[1].style.flex = '1';
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Auto-run on load
window.addEventListener('load', () => runCode());
</script>

</body>
</html>
